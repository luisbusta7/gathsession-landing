<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Tarea engregable 2 - Header Gathsession</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&display=swap" rel="stylesheet">
  </head>

  <body>

    <header class="header">
      <div class="container header__container">

        <a class="header__logo" href="#"><img src="img/logo-gathsession.svg" alt="Logotipo de GathSession"></a>

        <nav class="nav">
          <ul class="nav__list">
            <li class="nav__item"><a href="#" class="nav__link nav__link--active">Home</a></li>
            <li class="nav__item"><a href="#" class="nav__link">Features</a></li>
            <li class="nav__item"><a href="#" class="nav__link">Blog</a></li>
            <li class="nav__item"><a href="#" class="nav__link">Contact</a></li>
            <li class="nav__item"><a href="#" class="nav__link">About Us</a></li>
          </ul>
        </nav>

      </div>
    </header>

    <main>
      <section class="hero">
        <div class="hero__container">

          <div class="hero__content">
            <h1 class="hero__title">Build your best community starting from here.</h1>
            
            <p class="hero__text">Meet and communicate with the best people to run projects, 
              events or other activities in a more effective and fun way.</p>

            <div class="hero__actions">
              <a href="#" class="button button--primary">Get Started</a>
              <a href="#" class="hero__learn-link">Learn More<span class="hero__learn-arrow"><img src="img/arrow.svg" alt=""></span></a>
            </div>

            <section class="hero-features">
              <article class="hero-features__item">
                <div class="hero-features__icon">
                  <img src="img/icon-build-community.svg" alt="" />
                </div>
                <h2 class="hero-features__title">Build Community</h2>
              </article>

              <article class="hero-features__item">
                <div class="hero-features__icon">
                  <img src="img/icon-share-events.svg" alt="" />
                </div>
                <h2 class="hero-features__title">Share Events</h2>
              </article>

              <article class="hero-features__item">
                <div class="hero-features__icon">
                  <img src="img/icon-information.svg" alt="" />
                </div>
                <h2 class="hero-features__title">Get Information</h2>
              </article>
            </section>
          </div>

          <div class="hero__visual">

            <div class="hero__circle hero__circle--one"></div>
            <div class="hero__circle hero__circle--two"></div>

            <div class="people-card people-card--large people-card--purple">
              <img src="img/person-1.png" alt="" class="people-card__image" />
            </div>

            <div class="people-card people-card--small people-card--cyan">
              <img src="img/person-2.png" alt="" class="people-card__image" />
            </div>

            <div class="people-card people-card--large people-card--orange">
              <img src="img/person-4.png" alt="" class="people-card__image" />
            </div>

            <div class="people-card people-card--small people-card--pink">
              <img src="img/person-3.png" alt="" class="people-card__image" />
            </div>

            <div class="people-card people-card--large people-card--yellow">
              <img src="img/person-5.png" alt="" class="people-card__image" />
            </div>

          </div>

        </div>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
